apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Acquired Telemetry Service CI
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Mock Secrets Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] Secrets scan complete — 3 findings (CRITICAL: MQTT password, InfluxDB token, AWS keys)"
      - name: Mock SAST Scan
        uses: docker://alpine:3.19
        run: |
          echo "[SCAN] SAST scan complete — 1 finding (MEDIUM)"
      - name: Publish Security Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Security Scan Results — Acquired Telemetry Service
            | Scanner | Findings | Severity |
            |---------|----------|----------|
            | Secrets | 3 | CRITICAL |
            | SAST | 1 | MEDIUM |

            **Acquisition Assessment**: INCOMPLETE — assessment-complete.json missing (CCI-ACQ-001)
            **Critical Secrets**: MQTT password, InfluxDB token, AWS access/secret keys in src/ingest.py
            **SLA Status**: OVERDUE — acquisition asset with no remediation timeline established
          format: MARKDOWN

  build:
    needs:
      - scan
    outputs:
      artifact-id: ${{ steps.register-artifact.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v1
      - name: Build
        uses: docker://alpine:3.19
        run: |
          echo "Building acquired-telemetry-service v1.1.${{ cloudbees.run_number }}"
      - name: Register build artifact
        id: register-artifact
        uses: cloudbees-io/register-build-artifact@v2
        with:
          name: acquired-telemetry-service
          version: 1.1.${{ cloudbees.run_number }}
          url: https://github.com/shozab-unify-examples/stryker-acquired-telemetry-service
      - name: Publish Build Evidence
        uses: cloudbees-io/publish-evidence-item@v1
        with:
          content: |
            ## Build — Acquired Telemetry Service v1.1.${{ cloudbees.run_number }}
            - **Classification**: HIGH | acquisition | connected-device | telemetry | first-60-days
            - **Acquisition Date**: 2026-04-15 | Assessment: INCOMPLETE
          format: MARKDOWN

  deploy-dev:
    needs:
      - build
    steps:
      - name: Deploy to Dev
        uses: docker://alpine:3.19
        run: |
          echo "Deployed acquired-telemetry-service v1.1.${{ cloudbees.run_number }} to DEV"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: acquired-telemetry-service
          version: 1.1.${{ cloudbees.run_number }}
          environment-name: stryker-dev
          url: https://github.com/shozab-unify-examples/stryker-acquired-telemetry-service

  deploy-prod:
    needs:
      - build
      - deploy-dev
    steps:
      - name: Deploy to Production
        uses: docker://alpine:3.19
        run: |
          echo "Deployed acquired-telemetry-service v1.1.${{ cloudbees.run_number }} to PRODUCTION"
      - name: Register Deployed Artifact
        uses: cloudbees-io/register-deployed-artifact@v2
        with:
          artifact-id: ${{ needs.build.outputs.artifact-id }}
          name: acquired-telemetry-service
          version: 1.1.${{ cloudbees.run_number }}
          environment-name: stryker-prod
          url: https://github.com/shozab-unify-examples/stryker-acquired-telemetry-service
