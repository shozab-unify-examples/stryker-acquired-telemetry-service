name: First 60 Days Acquisition Assessment Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  acquisition-assessment:
    name: Acquisition Assessment — First 60 Days Gate
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check acquisition assessment completion
        id: assessment-check
        run: |
          echo "Checking for completed acquisition assessment..."
          ACQUISITION_DATE="2026-04-15"
          TODAY=$(date +%Y-%m-%d)
          DAYS_SINCE=$(( ($(date -d "$TODAY" +%s) - $(date -d "$ACQUISITION_DATE" +%s)) / 86400 ))
          echo "Days since acquisition: $DAYS_SINCE"
          echo "days_since=$DAYS_SINCE" >> $GITHUB_OUTPUT

          if [ ! -f acquisition/assessment-complete.json ]; then
            echo "assessment_complete=false" >> $GITHUB_OUTPUT
            echo "::error title=Acquisition Assessment Incomplete::acquisition/assessment-complete.json not found. High-risk connected-device service has not completed the mandatory first-60-days security and compliance assessment."
          else
            # Validate required fields
            APPROVED=$(python3 -c "import json; d=json.load(open('acquisition/assessment-complete.json')); print(d.get('approved', False))" 2>/dev/null || echo "false")
            if [ "$APPROVED" != "True" ]; then
              echo "assessment_complete=false" >> $GITHUB_OUTPUT
              echo "::error title=Acquisition Assessment Not Approved::Assessment found but not marked as approved."
            else
              echo "assessment_complete=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate SARIF finding
        if: steps.assessment-check.outputs.assessment_complete == 'false'
        run: |
          cat > acquisition-findings.sarif << 'EOF'
          {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "CCI Governance / Acquisition",
                    "version": "1.0.0",
                    "rules": [
                      {
                        "id": "CCI-ACQ-001",
                        "name": "AcquisitionAssessmentIncomplete",
                        "shortDescription": { "text": "First 60 Days Acquisition Assessment Incomplete" },
                        "fullDescription": { "text": "High-risk connected-device telemetry service has not completed mandatory first-60-days security and compliance assessment." },
                        "help": { "text": "Complete the acquisition security assessment using the CCI Acquisition Assessment Template. Submit for approval and place signed record in acquisition/assessment-complete.json." },
                        "properties": {
                          "tags": ["acquisition-governance", "first-60-days", "connected-device", "telemetry"],
                          "severity": "high",
                          "owner": "CCI Operations",
                          "policy": "First 60 Days Acquisition Assessment Required",
                          "remediationEffortHours": 28,
                          "estimatedNonComplianceCost": 250000
                        }
                      }
                    ]
                  }
                },
                "results": [
                  {
                    "ruleId": "CCI-ACQ-001",
                    "level": "error",
                    "message": { "text": "Acquisition assessment incomplete. High-risk connected-device service has not completed the first-60-days security assessment. Service was acquired 2026-04-15 and receives live telemetry from connected devices. Risk exposure is active and unquantified. Estimated non-compliance cost: $250,000. Remediation effort: 28 hours." },
                    "locations": [
                      {
                        "physicalLocation": {
                          "artifactLocation": { "uri": "acquisition", "uriBaseId": "%SRCROOT%" },
                          "region": { "startLine": 1 }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF

      - name: Upload SARIF
        if: steps.assessment-check.outputs.assessment_complete == 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: acquisition-findings.sarif
          category: cci-acquisition-governance

      - name: Fail pipeline — acquisition assessment gate
        if: steps.assessment-check.outputs.assessment_complete == 'false'
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║          CCI GOVERNANCE GATE FAILURE                        ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Policy:      First 60 Days Acquisition Assessment          ║"
          echo "║  Severity:    HIGH                                           ║"
          echo "║  Finding:     Acquisition assessment incomplete             ║"
          echo "║  Acquired:    2026-04-15                                    ║"
          echo "║  Owner:       CCI Operations                                ║"
          echo "║  Effort:      28 hours                                      ║"
          echo "║  Cost Risk:   \$250,000                                      ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          exit 1
